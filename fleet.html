<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fleet Adjustment System</title>

<style>
body { font-family: Arial; padding:20px; }
.tabs button { padding:10px; margin:5px; cursor:pointer; }
.tab { display:none; margin-top:15px; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border:1px solid #ccc; padding:6px; text-align:center; }
input, textarea { width:95%; }
.green { background:#d4edda; }
.yellow { background:#fff3cd; }
.red { background:#f8d7da; }
</style>
</head>

<body>

<h2>Fleet Adjustment System</h2>

<div class="tabs">
<button onclick="showTab('row')">Row Data</button>
<button onclick="showTab('partial')">Partial Fleet</button>
<button onclick="showTab('bus')">Bus Master</button>
<button onclick="showTab('output')">Output</button>
</div>

<!-- Row Data -->
<div id="row" class="tab">
<h3>Paste Raw Data</h3>
<textarea id="rawData" rows="10"></textarea><br>
<button onclick="cleanData()">Clean Data</button>

<table id="rowTable">
<tr><th>Main Route</th><th>Bus</th><th>Route</th><th>Time</th></tr>
</table>
</div>

<!-- Partial Fleet -->
<div id="partial" class="tab">
<h3>Partial Fleet</h3>
<table id="partialTable">
<tr><th>Slot</th><th>Route</th><th>Bus</th></tr>
</table>
<button onclick="addPartial()">Add Slot</button>
</div>

<!-- Bus Master -->
<div id="bus" class="tab">
<h3>Bus Master</h3>
<table id="busTable">
<tr><th>Bus</th><th>Main Route</th><th>Routes</th><th>Base</th><th>Action</th></tr>
</table>
<button onclick="addBus()">Add Bus</button>
</div>

<!-- Output -->
<div id="output" class="tab">
<h3>Result</h3>
<button onclick="run()">Run Adjustment</button>

<h4>Adjusted Fleet</h4>
<table id="resultTable"></table>

<h4>Logs</h4>
<ul id="logs"></ul>

<h4>Non-Ops</h4>
<ul id="nonOps"></ul>
</div>

<script>
let rowData = [];
let partialFleet = [];
let busMaster = JSON.parse(localStorage.getItem("busMaster")) || [];

const routeMap = {
  "THANE SOBO": ["HNMN","ALL","NTH","VV","KLS"],
  "CHEMBUR BKC": ["ALL"]
};

// Tabs
function showTab(id){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}

// ---------- PARSER ----------
function cleanData(){
  let raw = document.getElementById("rawData").value;
  let lines = raw.split("\n").map(l=>l.trim()).filter(l=>l);

  let currentMain = "";
  rowData = [];
  let i=0;

  while(i < lines.length){
    if(!lines[i].startsWith("C")){
      currentMain = lines[i];
      i++; continue;
    }

    let bus = lines[i++];
    let route = "";
    let next = lines[i];

    if(next && isNaN(next.split("/")[0])){
      route = next;
      i++;
    }

    if(lines[i] && lines[i].includes("/")) i++; // skip load
    let time = lines[i++];

    route = route.replace("HN MN","HNMN").replace("NTH Exp","NTH");

    rowData.push({mainRoute:currentMain, bus, route, time});
  }

  renderRow();
}

// ---------- RENDER ----------
function renderRow(){
  let table = document.getElementById("rowTable");
  table.innerHTML = "<tr><th>Main</th><th>Bus</th><th>Route</th><th>Time</th></tr>";

  rowData.forEach(r=>{
    table.innerHTML += `<tr>
      <td>${r.mainRoute}</td>
      <td>${r.bus}</td>
      <td>${r.route}</td>
      <td>${r.time}</td>
    </tr>`;
  });
}

// ---------- PARTIAL ----------
function addPartial(){
  let t = document.getElementById("partialTable");
  let row = t.insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
  `;
}

// ---------- BUS MASTER ----------
function addBus(){
  let t = document.getElementById("busTable");
  let row = t.insertRow();

  row.innerHTML = `
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><input></td>
    <td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
  `;
}

function saveBus(){
  let rows = document.querySelectorAll("#busTable tr");
  busMaster = [];

  rows.forEach((r,i)=>{
    if(i===0) return;
    let cells = r.querySelectorAll("input");
    if(cells.length){
      busMaster.push({
        bus: cells[0].value,
        mainRoute: cells[1].value,
        routes: cells[2].value.split(","),
        base: cells[3].value
      });
    }
  });

  localStorage.setItem("busMaster", JSON.stringify(busMaster));
}

// ---------- HELPERS ----------
function getMainRoute(route){
  for(let m in routeMap){
    if(routeMap[m].includes(route)) return m;
  }
  return null;
}

function isSimilarRoute(r1,r2){
  if(r1===r2) return true;
  return getMainRoute(r1) === getMainRoute(r2);
}

function isValidBus(busObj, route){
  if(!busObj.routes.includes(route)) return false;
  if(busObj.base !== busObj.mainRoute) return false;
  return true;
}

// ---------- ALGORITHM ----------
function run(){

  saveBus();

  // collect partial data
  partialFleet = [];
  let rows = document.querySelectorAll("#partialTable tr");

  rows.forEach((r,i)=>{
    if(i===0) return;
    let inputs = r.querySelectorAll("input");
    partialFleet.push({
      slot: inputs[0].value,
      route: inputs[1].value,
      bus: inputs[2].value
    });
  });

  let nonOps = [];
  let logs = [];

  let rowBuses = rowData.map(r=>r.bus);
  let pfBuses = partialFleet.map(p=>p.bus);

  // Non Ops
  rowBuses.forEach(b=>{
    if(!pfBuses.includes(b)) nonOps.push(b);
  });

  // Replace wrong
  partialFleet.forEach(p=>{
    if(p.bus && !rowBuses.includes(p.bus)){
      let match = rowData.find(r=>isSimilarRoute(r.route,p.route));
      if(match){
        logs.push(`${match.bus} instead of ${p.bus}`);
        p.bus = match.bus;
      }
    }
  });

  // Assign
  partialFleet.forEach(p=>{
    let candidates = rowData.filter(r=>isSimilarRoute(r.route,p.route));

    let valid = candidates.filter(c=>{
      let busObj = busMaster.find(b=>b.bus===c.bus);
      return busObj && isValidBus(busObj,p.route);
    });

    if(valid.length){
      p.bus = valid[0].bus;
      p.status = "green";
    } else {
      p.bus = "Fallback";
      p.status = "red";
    }
  });

  renderOutput(partialFleet, logs, nonOps);
}

// ---------- OUTPUT ----------
function renderOutput(data, logs, nonOps){

  let table = document.getElementById("resultTable");
  table.innerHTML = "<tr><th>Slot</th><th>Route</th><th>Bus</th></tr>";

  data.forEach(d=>{
    table.innerHTML += `<tr class="${d.status}">
      <td>${d.slot}</td>
      <td>${d.route}</td>
      <td>${d.bus}</td>
    </tr>`;
  });

  let logEl = document.getElementById("logs");
  logEl.innerHTML = logs.map(l=>`<li>${l}</li>`).join("");

  let nonEl = document.getElementById("nonOps");
  nonEl.innerHTML = nonOps.map(n=>`<li>${n}</li>`).join("");
}

// default tab
showTab("row");
</script>

</body>
</html>
