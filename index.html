<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub Report Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

:root {
  --morning: #f59e0b;
  --evening: #6366f1;
  --active: #f59e0b;
  --bg: #0f1117;
  --card: #1a1d27;
  --card2: #20243a;
  --border: #2e3250;
  --text: #e8eaf6;
  --muted: #7c82a8;
  --green: #10b981;
  --red: #ef4444;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.app {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 20px;
  align-items: start;
}

.header {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px 24px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  gap: 14px;
}

.header h1 {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--active);
  text-align: center;
}
.header h1 span { color: var(--text); }

.header-right {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

/* HUB TABS */
.hub-tabs {
  display: flex;
  background: var(--bg);
  border-radius: 50px;
  padding: 4px;
  gap: 4px;
  border: 1px solid var(--border);
}

.hub-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  background: transparent;
  color: var(--muted);
  transition: all 0.25s;
}

.hub-btn.active {
  background: var(--active);
  color: #000;
}

body.evening-mode .hub-btn.active {
  background: var(--evening);
  color: #fff;
}

/* MODE TOGGLE */
.mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 50px;
  padding: 4px;
  gap: 4px;
  border: 1px solid var(--border);
}

.mode-btn {
  padding: 8px 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  background: transparent;
  color: var(--muted);
  transition: all 0.25s;
}

.mode-btn.active-morning { background: var(--morning); color: #000; }
.mode-btn.active-evening { background: var(--evening); color: #fff; }

.left-panel { display: flex; flex-direction: column; gap: 14px; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}

.card-header .route-label {
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--active);
  text-transform: uppercase;
}

.card-header .secondary-tag {
  font-size: 0.68rem;
  background: #2e3250;
  color: var(--muted);
  padding: 2px 8px;
  border-radius: 20px;
}

.card textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  padding: 10px 14px;
  resize: vertical;
  min-height: 52px;
  outline: none;
}

.card textarea::placeholder { color: #3d4270; }
.card textarea:focus { background: rgba(255,255,255,0.02); }

.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 6px 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.extras-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.field-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.extras-card textarea {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  padding: 10px 12px;
  resize: vertical;
  min-height: 50px;
  outline: none;
}

.extras-card textarea:focus { border-color: var(--active); }
.extras-card textarea::placeholder { color: #3d4270; }

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 11px 22px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  transition: all 0.2s;
}

.btn-generate { background: var(--active); color: #000; flex: 1; }
.btn-generate:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-copy { background: var(--green); color: #fff; }
.btn-copy:hover { opacity: 0.85; }
.btn-clear { background: #2e3250; color: var(--muted); }
.btn-clear:hover { background: var(--border); }

.right-panel {
  position: sticky;
  top: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.preview-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}

.preview-header span {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.preview-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.preview-dot.live { background: var(--green); animation: pulse 1.5s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

#telegramPreview {
  padding: 16px;
  white-space: pre-wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.7;
  color: #c5cae9;
  min-height: 120px;
  max-height: 500px;
  overflow-y: auto;
}

#telegramPreview::-webkit-scrollbar { width: 4px; }
#telegramPreview::-webkit-scrollbar-track { background: transparent; }
#telegramPreview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-preview {
  color: #3d4270;
  font-style: italic;
  text-align: center;
  padding: 40px 20px;
}

.export-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.export-card h3 {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.export-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.export-card select, .export-card input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  padding: 8px 12px;
  outline: none;
  flex: 1;
}

.export-card select:focus, .export-card input:focus { border-color: var(--active); }
#customDays { display: none; max-width: 100px; }

.btn-export {
  background: #6366f1;
  color: #fff;
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.btn-export:hover { opacity: 0.85; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #fff;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: var(--red); }

.routes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .right-panel { position: static; }
  .routes-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  body { padding: 10px; }
  .app { gap: 12px; }
  .header { padding: 14px 12px; gap: 10px; }
  .header h1 { font-size: 1.15rem; }
  .header-right { gap: 8px; flex-direction: column; align-items: center; }
  .hub-tabs { width: 100%; justify-content: center; }
  .hub-btn { padding: 7px 12px; font-size: 0.78rem; flex: 1; text-align: center; }
  .mode-toggle { width: 100%; justify-content: center; }
  .mode-btn { padding: 7px 0; font-size: 0.78rem; flex: 1; text-align: center; }
  .routes-grid { grid-template-columns: 1fr; }
  .actions { gap: 8px; }
  .btn { padding: 10px 14px; font-size: 0.82rem; }
  .actions a { padding: 10px 14px !important; font-size: 0.82rem !important; }
  #telegramPreview { font-size: 0.72rem; }
}

body.evening-mode { --active: #818cf8; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Hub <span>Report Builder</span></h1>
    <div class="header-right">
      <!-- HUB TABS -->
      <div class="hub-tabs">
        <button class="hub-btn active" id="hubCentral" onclick="setHub('central')">🏙 Central</button>
        <button class="hub-btn" id="hubHarbour" onclick="setHub('harbour')">⚓ Harbour</button>
        <button class="hub-btn" id="hubWestern" onclick="setHub('western')">🌇 Western</button>
      </div>
      <!-- MODE TOGGLE -->
      <div class="mode-toggle">
        <button class="mode-btn active-morning" id="btnMorning" onclick="setMode('morning')">☀️ Morning</button>
        <button class="mode-btn" id="btnEvening" onclick="setMode('evening')">🌙 Evening</button>
      </div>
      <span id="currentDate" style="font-size:0.8rem; color:var(--muted);"></span>
    </div>
  </div>

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div id="routeSections"></div>

    <!-- MORNING EXTRAS -->
    <div id="morningExtras">
      <div class="section-title">Morning Sections</div>
      <div class="extras-card">
        <div>
          <div class="field-label">Rest / Notes</div>
          <textarea id="notes" placeholder="Rest All Ready For Tomorrow" rows="2"></textarea>
        </div>
        <div>
          <div class="field-label">Route Training Requirements</div>
          <textarea id="training" placeholder="Enter training requirements..." rows="2"></textarea>
        </div>
        <div>
          <div class="field-label">Backup Buses</div>
          <textarea id="backup" placeholder="Enter Backup Buses Here..." rows="3"></textarea>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn btn-generate" onclick="generate()">⚡ Generate Report</button>
      <button class="btn btn-copy" onclick="copyReport()">📋 Copy</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
      <a href="https://hub-report.pages.dev/analytics" style="padding:11px 22px; background:#38bdf8; color:#000; border-radius:50px; font-family:Outfit,sans-serif; font-size:0.88rem; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:6px;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">📊 Analytics</a>
      <a href="https://hub-report.pages.dev/partial_fleet_builder" style="padding:11px 22px; background:#a855f7; color:#fff; border-radius:50px; font-family:Outfit,sans-serif; font-size:0.88rem; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:6px;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">🚌 Partial Fleet</a>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="preview-card">
      <div class="preview-header">
        <span>Telegram Preview</span>
        <div class="preview-dot" id="previewDot"></div>
      </div>
      <div id="telegramPreview">
        <div class="empty-preview">Generate a report to see preview</div>
      </div>
    </div>

    <div class="export-card">
      <h3>📊 Export Report</h3>
      <div class="export-row">
        <select id="reportType" onchange="toggleCustomDays()">
          <option value="1">Last 1 Day</option>
          <option value="3">Last 3 Days</option>
          <option value="7">Last 7 Days</option>
          <option value="30">Last 30 Days</option>
          <option value="month">This Month</option>
          <option value="year">This Year</option>
          <option value="custom">Custom Days</option>
        </select>
        <input id="customDays" placeholder="Days" type="number" min="1">
        <button class="btn-export" onclick="exportReport()">Export CSV</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>

const NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
const ISSUE_KEYWORDS = ['issue','tyre','driver','mechanical','ac','pending','rental','na','n/a','breakdown','flat'];

/* ── HUB DEFINITIONS ── */
const HUBS = {

  central: {
    label: 'Central Hub',
    main: [
      { id: 'T-LP',          morning: 'T-LP',          evening: 'LP - Thane' },
      { id: 'Chembur-BKC',   morning: 'Chembur-BKC',   evening: 'BKC - Chembur' },
      { id: 'T-BKC',         morning: 'T-BKC',          evening: 'BKC - Thane' },
      { id: 'T-Sobo',        morning: 'T-Sobo',         evening: 'Sobo - Thane' },
      { id: 'Chembur-Worli', morning: 'Chembur-Worli',  evening: 'Worli - Chembur' },
      { id: 'Mulund-LP',     morning: 'Mulund-LP',      evening: 'LP - Mulund' },
      { id: 'T-NM',          morning: 'T-NM',           evening: 'NM - Thane' },
      { id: 'MULUND-BKC',    morning: 'MULUND - BKC',   evening: 'BKC - MULUND' },
      { id: 'T-Santacruze',  morning: 'T-Santacruze',   evening: 'Santacruz - Thane' },
      { id: 'BKC-Metro',     morning: 'BKC-Metro',      evening: 'Metro - BKC' },
      { id: 'Worli-BKC',     morning: 'Worli-BKC',      evening: 'BKC - Worli' },
      { id: 'Chembur-SOBO',  morning: 'Chembur-SOBO',   evening: 'SOBO - Chembur' },
    ],
    secondary: [
      { id: 'BKC-Ghatkopar', morning: 'BKC - Ghatkopar', evening: 'BKC - Ghatkopar' },
      { id: 'Mulund-SOBO',   morning: 'Mulund-SOBO',     evening: 'SOBO - Mulund' },
      { id: 'MJW-LP',        morning: 'MJW-LP',           evening: 'LP - MJW' },
      { id: 'MJW-BKC',       morning: 'MJW-BKC',          evening: 'BKC - MJW' },
    ]
  },

  western: {
    label: 'Western Hub',
    main: [
      { id: 'W-Kandivali-BKC',    morning: 'Kandivali - BKC',           evening: 'BKC - Kandivali' },
      { id: 'W-Thane-Marol',      morning: 'Thane - Marol',             evening: 'Marol - Thane' },
      { id: 'W-Borivali-BKC',     morning: 'Borivali - BKC',            evening: 'BKC - Borivali' },
      { id: 'W-MB-Powai',         morning: 'Mira Bhayandar - Powai',    evening: 'Powai - Mira Bhayandar' },
      { id: 'W-Thane-Powai',      morning: 'Thane - Powai',             evening: 'Powai - Thane' },
      { id: 'W-MB-BKC',           morning: 'Mira Bhayandar - BKC',      evening: 'BKC - Mira Bhayandar' },
      { id: 'W-MB-SakiNaka',      morning: 'Mira Bhayandar - Saki Naka',evening: 'Saki Naka - Mira Bhayandar' },
      { id: 'W-Mulund-Andheri',   morning: 'Mulund - Andheri',          evening: 'Andheri - Mulund' },
      { id: 'W-Thane-Andheri',    morning: 'Thane - Andheri',           evening: 'Andheri - Thane' },
      { id: 'W-AndheriW-BKC',     morning: 'Andheri (W) - BKC',         evening: 'BKC - Andheri (W)' },
      { id: 'W-Mulund-GG',        morning: 'Mulund - Goregaon (STH)',   evening: 'Goregaon (STH) - Mulund' },
      { id: 'W-Thane-GG',         morning: 'Thane - Goregaon (NTH)',    evening: 'Goregaon (NTH) - Thane' },
    ],
    secondary: []
  },

  harbour: {
    label: 'Harbour Hub',
    main: [
      { id: 'H-NM-Andheri',       morning: 'Navi Mumbai - Andheri',             evening: 'Andheri - Navi Mumbai' },
      { id: 'H-NM-BKC',           morning: 'Navi Mumbai - BKC',                 evening: 'BKC - Navi Mumbai' },
      { id: 'H-NM-LP',            morning: 'Navi Mumbai - Lower Parel',         evening: 'Lower Parel - Navi Mumbai' },
      { id: 'H-Panvel-BKC',       morning: 'Panvel - BKC',                      evening: 'BKC - Panvel' },
      { id: 'H-Panvel-LP',        morning: 'Panvel - Lower Parel',              evening: 'Lower Parel - Panvel' },
      { id: 'H-Panvel-SOBO',      morning: 'Panvel - South Mumbai',             evening: 'South Mumbai - Panvel' },
      { id: 'H-Vashi-Andheri',    morning: 'Vashi - Andheri',                   evening: 'Andheri - Vashi' },
      { id: 'H-Vashi-GG',         morning: 'Vashi - Goregaon',                  evening: 'Goregaon - Vashi' },
      { id: 'H-Vashi-BKC',        morning: 'Vashi - BKC',                       evening: 'BKC - Vashi' },
      { id: 'H-Vashi-Worli',      morning: 'Vashi - Worli',                     evening: 'Worli - Vashi' },
      { id: 'H-NM-SOBO',          morning: 'Navi Mumbai - South Mumbai',        evening: 'South Mumbai - Navi Mumbai' },
      { id: 'H-NM-SOBO-Atal',     morning: 'Navi Mumbai - South Mumbai (Atal Setu)', evening: 'South Mumbai - Navi Mumbai (Atal Setu)' },
      { id: 'H-NM-Worli',         morning: 'Navi Mumbai - Worli',               evening: 'Worli - Navi Mumbai' },
      { id: 'H-PBR-BKC',          morning: 'Palm Beach Road - BKC',             evening: 'BKC - Palm Beach Road' },
      { id: 'H-PBR-LP',           morning: 'Palm Beach Road - Lower Parel',     evening: 'Lower Parel - Palm Beach Road' },
      { id: 'H-PBR-SOBO',         morning: 'Palm Beach Road - South Mumbai',    evening: 'South Mumbai - Palm Beach Road' },
    ],
    secondary: []
  }
};

/* Shortcut map for output text */
const SHORTCUTS = {
  'Navi Mumbai': 'NM',
  'Lower Parel': 'LP',
  'South Mumbai': 'SOBO',
  'Palm Beach Road': 'PBR',
  'Goregaon': 'GG',
  'Mira Bhayandar': 'MB',
};

function applyShortcuts(name) {
  let out = name;
  for (const [full, short] of Object.entries(SHORTCUTS)) {
    out = out.replace(new RegExp(full, 'gi'), short);
  }
  return out;
}

let currentHub = 'central';
let mode = 'morning';

document.addEventListener('DOMContentLoaded', () => {

  document.getElementById('currentDate').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  setHub('central');
});

function setHub(hub) {
  currentHub = hub;
  ['central','harbour','western'].forEach(h => {
    document.getElementById('hub' + h.charAt(0).toUpperCase() + h.slice(1)).classList.toggle('active', h === hub);
  });
  clearAll(true);
  renderRoutes();
}

function setMode(m) {
  mode = m;
  document.body.className = m === 'evening' ? 'evening-mode' : '';
  document.getElementById('btnMorning').className = 'mode-btn' + (m === 'morning' ? ' active-morning' : '');
  document.getElementById('btnEvening').className = 'mode-btn' + (m === 'evening' ? ' active-evening' : '');
  document.getElementById('morningExtras').style.display = m === 'morning' ? 'block' : 'none';
  renderRoutes();
}

function rid(r) { return 'r_' + r.id.replace(/[^a-zA-Z0-9]/g, '_'); }

function renderRoutes() {
  const hub = HUBS[currentHub];
  const saved = {};
  [...hub.main, ...hub.secondary].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el) saved[r.id] = el.value;
  });

  let html = '';

  if (hub.main.length) {
    if (hub.secondary.length) html += `<div class="section-title">Main Routes</div>`;
    html += `<div class="routes-grid">`;
    hub.main.forEach(r => { html += makeCard(r, false); });
    html += `</div>`;
  }

  if (hub.secondary.length) {
    html += `<div class="section-title" style="margin-top:8px;">Secondary Routes ▪️</div>`;
    html += `<div class="routes-grid">`;
    hub.secondary.forEach(r => { html += makeCard(r, true); });
    html += `</div>`;
  }

  document.getElementById('routeSections').innerHTML = html;

  [...hub.main, ...hub.secondary].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el && saved[r.id]) el.value = saved[r.id];
  });
}

function makeCard(r, isSecondary) {
  const label = mode === 'evening' ? r.evening : r.morning;
  return `
    <div class="card">
      <div class="card-header">
        <span class="route-label">${isSecondary ? '▪️ ' : ''}<b>${label}</b></span>
        ${isSecondary ? '<span class="secondary-tag">secondary</span>' : ''}
      </div>
      <textarea id="${rid(r)}" placeholder="Enter bus issues..."></textarea>
    </div>`;
}

function formatText(line) {
  line = line.replace(/\bc(\d+)/gi, 'C$1');
  line = line.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
  return line.trim();
}

function parseBackup(raw) {
  const available = [], issues = [];
  raw.split('\n').forEach(line => {
    line = formatText(line.trim());
    if (!line) return;
    const low = line.toLowerCase();
    ISSUE_KEYWORDS.some(k => low.includes(k)) ? issues.push(line) : available.push(line);
  });
  return { available, issues };
}

function generate() {
  const hub = HUBS[currentHub];
  const allRoutes = [...hub.main, ...hub.secondary];
  const date = new Date().toISOString().slice(0, 10);
  const records = [];
  const hubLabel = hub.label;

  let out = `✪ ${hubLabel} Update\n\n`;
  let hasContent = false;

  // Central: sorted (filled first), others: fixed order with numbers
  let routeList;
  if (currentHub === 'central') {
    routeList = getSortedCentral(hub);
  } else {
    routeList = allRoutes.map(r => ({ r, secondary: false }));
  }

  let numIdx = 0;
  routeList.forEach(({ r, secondary }) => {
    const el = document.getElementById(rid(r));
    if (!el) return;
    const val = el.value.trim();
    const displayName = mode === 'evening' ? r.evening : r.morning;
    // For output, apply shortcuts for western/harbour
    const outputName = (currentHub === 'central') ? displayName : applyShortcuts(displayName);
    const prefix = secondary ? '▪️' : NUMS[numIdx++];

    if (val) {
      hasContent = true;
      out += `${prefix} **${outputName}**\n`;
      val.split('\n').forEach(v => {
        v = formatText(v);
        if (!v) return;
        out += `– ${v}\n`;
        const parts = v.split(' ');
        records.push({ date, mode, hub: currentHub, route: displayName, bus: parts[0], issue: parts.slice(1).join(' ').trim() });
      });
      out += '\n';
    } else {
      out += `${prefix} **${outputName}**\n\n`;
    }
  });

  if (!hasContent) { showToast('No route data entered', true); return; }

  if (mode === 'morning') {
    const backup = document.getElementById('backup').value.trim();
    if (backup) {
      const { available, issues } = parseBackup(backup);
      out += `**🚌 Backup Buses**\n`;
      if (available.length) { out += `✅ Available:\n`; available.forEach(b => { out += `– ${b}\n`; }); }
      if (issues.length)    { out += `⚠️ Issues:\n`;   issues.forEach(b => { out += `– ${b}\n`; }); }
      out += '\n';
    }
    const training = document.getElementById('training').value.trim();
    if (training) {
      out += `**📋 Training Requirements**\n`;
      training.split('\n').forEach(t => { t = formatText(t); if (t) out += `– ${t}\n`; });
      out += '\n';
    }
    const notes = document.getElementById('notes').value.trim() || 'Rest All Ready For Tomorrow';
    out += `— — — — — —\n• **${notes}**\n`;
  }

  document.getElementById('telegramPreview').innerText = out;
  document.getElementById('previewDot').className = 'preview-dot live';
  if (records.length) autoSave(records);
  showToast('Report generated ✓');
}

function getSortedCentral(hub) {
  const filledMain = [], filledSec = [], emptySec = [], emptyMain = [];
  hub.main.forEach(r => {
    const val = (document.getElementById(rid(r)) || {}).value || '';
    (val.trim() ? filledMain : emptyMain).push({ r, secondary: false });
  });
  hub.secondary.forEach(r => {
    const val = (document.getElementById(rid(r)) || {}).value || '';
    (val.trim() ? filledSec : emptySec).push({ r, secondary: true });
  });
  return [...filledMain, ...filledSec, ...emptySec, ...emptyMain];
}

function copyReport() {
  const txt = document.getElementById('telegramPreview').innerText;
  if (!txt || txt.includes('Generate a report')) { showToast('Generate report first', true); return; }
  navigator.clipboard.writeText(txt).then(() => showToast('Copied to clipboard ✓'));
}

function clearAll(silent = false) {
  const hub = HUBS[currentHub];
  [...hub.main, ...hub.secondary].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el) el.value = '';
  });
  ['notes','training','backup'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('telegramPreview').innerHTML = '<div class="empty-preview">Generate a report to see preview</div>';
  document.getElementById('previewDot').className = 'preview-dot';
  if (!silent) showToast('Cleared');
}

function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (error ? ' error' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 2500);
}

function toggleCustomDays() {
  document.getElementById('customDays').style.display =
    document.getElementById('reportType').value === 'custom' ? 'block' : 'none';
}

async function autoSave(records) {
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ routes: records, mode, timestamp: new Date().toISOString() })
    });
    const text = await res.text();
    try { JSON.parse(text); } catch { }
    showToast('Saved successfully ✓');
  } catch(e) {
    console.error('Save error:', e);
    showToast('Save failed: ' + e.message, true);
  }
}

async function fetchData() {
  const res = await fetch('/api/data');
  const data = await res.json();
  return data.reports || [];
}

function downloadCSV(records, name) {
  let csv = 'date,mode,hub,route,bus,issue\n';
  records.forEach(r => { csv += `${r.date},${r.mode},${r.hub || ''},"${r.route}","${r.bus}","${r.issue}"\n`; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = name;
  a.click();
  showToast('CSV downloaded ✓');
}

async function exportReport() {
  const type = document.getElementById('reportType').value;
  let data;
  try { data = await fetchData(); } catch(e) { showToast('Failed to fetch data', true); return; }
  const now = new Date();
  let filtered, filename;
  if (type === 'month') {
    filtered = data.filter(r => { const d = new Date(r.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
    filename = `monthly_${now.toISOString().slice(0,7)}.csv`;
  } else if (type === 'year') {
    filtered = data.filter(r => new Date(r.date).getFullYear() === now.getFullYear());
    filename = `yearly_${now.getFullYear()}.csv`;
  } else {
    const days = type === 'custom' ? parseInt(document.getElementById('customDays').value) || 1 : parseInt(type);
    const start = new Date(); start.setDate(now.getDate() - days);
    filtered = data.filter(r => new Date(r.date) >= start);
    filename = `report_${days}days.csv`;
  }
  if (!filtered.length) { showToast('No data for selected range', true); return; }
  downloadCSV(filtered, filename);
}

</script>
