<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Hub Report Builder</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
}

.section{
margin-bottom:10px;
}

textarea{
width:100%;
min-height:60px;
padding:8px;
font-family:Courier New;
}

button{
padding:10px 24px;
background:#4f46e5;
color:#fff;
border:none;
border-radius:20px;
cursor:pointer;
margin:5px;
}

.copy{
background:#16a34a;
}

.mode{
margin-bottom:12px;
}

  
#previewBox{
margin-top:25px;
display:flex;
justify-content:center;
}

#telegramPreview{
background:#e9f5ff;
border-radius:10px;
padding:15px;
max-width:520px;
white-space:pre-wrap;
font-family:Segoe UI;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

/* EXPORT UI */

.exportBox{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#f6f7ff;
}

select,input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
}
  
</style>

</head>

<body>

</div>
  
<div class="container">

<h2>Central Hub Report Builder</h2>

<div class="mode">
Mode:
<button onclick="setMode('morning')">Morning</button>
<button onclick="setMode('evening')">Evening</button>
</div>

</div>

<div id="routes"></div>

<div id="morningExtras">

<div class="section">
<h3>Rest / Notes</h3>
<textarea id="notes" placeholder="Rest All Ready For Tomorrow"></textarea>
</div>

<div class="section">
<h3>Route Training Requirements</h3>
<textarea id="training"></textarea>
</div>

</div>

<div class="section">
<h3>Backup Buses</h3>
<textarea id="backup"></textarea>
</div>

<button onclick="generate()">Generate Report</button>
<button class="copy" onclick="copyReport()">Copy</button>


<div class="exportBox">

<h3>Export Report</h3>

<select id="reportType">
<option value="1">Last 1 Day</option>
<option value="3">Last 3 Days</option>
<option value="7">Last 7 Days</option>
<option value="30">Last 30 Days</option>
<option value="month">This Month</option>
<option value="year">This Year</option>
<option value="custom">Custom Days</option>
</select>

<input id="customDays" placeholder="Enter days">

<button onclick="exportReport()">Export CSV</button>

</div>


<div id="previewBox">
<div id="telegramPreview"></div>
</div>

</div>
  
<script>

let mode="morning";

/* TEXT FORMAT */

function formatText(line){

line=line.replace(/\bc(\d+)/gi,'C$1');
line=line.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());

return line.trim();

}

/* ROUTES */

const ROUTES=[
'T-LP','Chembur-BKC','T-BKC','T-Sobo','Chembur-Worli',
'Mulund-LP','T-NM','MULUND - BKC','T-Santacruze',
'BKC-Metro','Worli Metro-LP','Worli-BKC','Chembur-SOBO'
];

/* MODE */

function setMode(m){
mode=m;
renderRoutes();
document.getElementById("morningExtras").style.display=
(mode==="morning")?"block":"none";
}

/* RENDER ROUTES */

function renderRoutes(){

let html="";

ROUTES.forEach(route=>{

html+=`
<div class="section">
<h3><b>${route}</b></h3>
<textarea id="${route}"></textarea>
</div>
`;

});

document.getElementById("routes").innerHTML=html;

}

/* GENERATE REPORT */

function generate(){

let out="✪ Central Hub Update\n\n";

let records=[];

const date=new Date().toISOString().slice(0,10);

ROUTES.forEach(r=>{

const val=document.getElementById(r).value.trim();

if(!val) return;

out+=`**${r}**\n`;

val.split("\n").forEach(v=>{

v=formatText(v);

out+="– "+v+"\n";

let bus=v.split(" ")[0];

let issue=v.replace(bus,"").trim();

records.push({
date:date,
mode:mode,
route:r,
bus:bus,
issue:issue
});

});

out+="\n";

});

document.getElementById("telegramPreview").innerText=out;

/* SAVE */

autoSave(records);

}

/* JSONBIN SAVE */

async function autoSave(records){

const BIN_ID="69b1458ab7ec241ddc5c77b5";
const API_KEY="$2a$10$BWlXER8xOcWhq9v.h03UvODyEb15T1ca3ejRc6kPcRwkJB1xMNj2.";

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
headers:{ "X-Master-Key":API_KEY }
});

const data=await res.json();

let db=data.record.reports || [];

db=db.concat(records);

await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify({reports:db})
});

}

/* FETCH DATA */

async function fetchData(){

const BIN_ID="YOUR_BIN_ID";
const API_KEY="YOUR_API_KEY";

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
headers:{ "X-Master-Key":API_KEY }
});

const data=await res.json();

return data.record.reports || [];

}

/* CSV DOWNLOAD */

function downloadCSV(records,name){

let csv="date,mode,route,bus,issue\n";

records.forEach(r=>{
csv+=`${r.date},${r.mode},${r.route},${r.bus},${r.issue}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download=name;
a.click();

}

/* EXPORT LOGIC */

async function exportReport(){

const type=document.getElementById("reportType").value;

if(type==="month"){
exportMonth();
return;
}

if(type==="year"){
exportYear();
return;
}

let days;

if(type==="custom"){
days=parseInt(document.getElementById("customDays").value);
}else{
days=parseInt(type);
}

exportDays(days);

}

/* DAYS */

async function exportDays(days){

const data=await fetchData();

const now=new Date();

const start=new Date();

start.setDate(now.getDate()-days);

const filtered=data.filter(r=>new Date(r.date)>=start);

downloadCSV(filtered,days+"_days_report.csv");

}

/* MONTH */

async function exportMonth(){

const data=await fetchData();

const now=new Date();

const m=now.getMonth();
const y=now.getFullYear();

const filtered=data.filter(r=>{
let d=new Date(r.date);
return d.getMonth()==m && d.getFullYear()==y;
});

downloadCSV(filtered,"monthly_report.csv");

}

/* YEAR */

async function exportYear(){

const data=await fetchData();

const y=new Date().getFullYear();

const filtered=data.filter(r=>{
return new Date(r.date).getFullYear()==y;
});

downloadCSV(filtered,"yearly_report.csv");

}

/* COPY */

function copyReport(){

const txt=document.getElementById("telegramPreview").innerText;

if(!txt){
alert("Generate report first");
return;
}

navigator.clipboard.writeText(txt);

alert("Report copied");

}

setMode("morning");

</script>

</body>
</html>
