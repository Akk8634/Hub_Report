<style>

<body>

<div class="container">

<h2>Central Hub Report Builder</h2>

<div class="mode">
Mode:
<button onclick="setMode('morning')">Morning</button>
<button onclick="setMode('evening')">Evening</button>
</div>

<div id="routes"></div>

<div id="morningExtras">

<div class="section">
<h3>Rest / Notes</h3>

</div>

<div class="section">
<h3>Route Training Requirements</h3>
<textarea id="training"></textarea>
</div>

</div>

</div>

<button onclick="generate()">Generate Report</button>
<button class="copy" onclick="copyReport()">Copy</button>

<div id="previewBox">
<div id="telegramPreview"></div>
</div>

</div>

<script>

let mode="morning";

/* TEXT FORMAT */

function formatText(line){

line=line.replace(/\bc(\d+)/gi,'C$1');

line=line.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());

return line.trim();

}

/* ROUTE STRUCTURE */

const MORNING=[
['в‘ ','T-LP'],['в‘Ў','Chembur-BKC'],['в‘ў','T-BKC'],['в‘Ј','T-Sobo'],
['в‘¤','Chembur-Worli'],['в‘Ґ','Mulund-LP'],['в‘¦','T-NM'],

/* MORNING EXTRA */

notes="Rest All Ready For Tomorrow";

lines.forEach(l=>{

if(issue){

issues.push(formatText(l));

}else{

available.push(formatText(l));

}
<script>

}

['в‘¤','Chembur-Worli'],['в‘Ґ','Mulund-LP'],['в‘¦','T-NM'],
['в‘§','MULUND - BKC'],['в‘Ё','T-Santacruze'],['в‘©','BKC-Metro'],
['в‘Є','Worli Metro-LP'],['в‘«','Worli-BKC'],['в‘¬','Chembur-SOBO'],
['в–ЄпёЏ','BKC - Ghatkopar'],['в–ЄпёЏ','Mulund-SOBO'],['в–ЄпёЏ','MJW-LP'],['в–ЄпёЏ','MJW-BKC']
];

const EVENING = [
['вќ¶','LP - Thane'],['вќ·','Sobo - Thane'],['вќё','BKC - Thane'],
['вќ№','LP - Mulund'],['вќє','Worli - Chembur'],
['вќ»','Worli-BKC'],['вќј','Santacruz - Thane'],
['вќЅ','Worli Metro-LP'],['вћ’','BKC-Metro'],
['вћ“','BKC - Chembur'],['в“«','NM - Thane'],['в“¬','SOBO - Chembur'],
['в–ЄпёЏ','Ghatkopar - BKC'],['в–ЄпёЏ','SOBO - Mulund'],['в–ЄпёЏ','BKC - Mulund'],
['в–ЄпёЏ','LP - MJW'],['в–ЄпёЏ','BKC - MJW'],['в–ЄпёЏ','BKC - Mulund']
];

/* MODE */

function setMode(m){
mode = m;
renderRoutes();
document.getElementById("morningExtras").style.display =
(mode==="morning") ? "block" : "none";
}

/* RENDER ROUTE INPUT */

function renderRoutes(){

const list = (mode==="morning") ? MORNING : EVENING;

let html="";

list.forEach(([sym,id])=>{
html += `<div class="section">
<h3>${sym} ${id}</h3>
<textarea id="${id}"></textarea>
</div>`;
});

document.getElementById("routes").innerHTML = html;

}

/* GENERATE REPORT */

function generate(){

const list = (mode==="morning") ? MORNING : EVENING;

let filled=[];
let empty=[];

list.forEach(([sym,id])=>{

const val=document.getElementById(id).value.trim();

let route={
name:id,
data:[]
};

if(val){

val.split('\n')
.map(v=>v.trim())
.filter(Boolean)
.forEach(v=>{
let clean=v.replace(/^[-вЂўвЂ“]\s*/,'');
clean=formatText(clean);
route.data.push(clean);
});

filled.push(route);

}else{

empty.push(route);

}

});

let all=[...filled,...empty];

let numbers=[
"в‘ ","в‘Ў","в‘ў","в‘Ј","в‘¤","в‘Ґ","в‘¦","в‘§","в‘Ё","в‘©",
"в‘Є","в‘«","в‘¬","в‘­","в‘®","в‘Ї","в‘°","в‘±","в‘І","в‘і"
];

let out="вњЄ Central Hub Update\n\n";

all.forEach((r,i)=>{

let num = numbers[i] || (i+1)+".";

out += `${num} ${r.name}\n`;

if(r.data.length){

r.data.forEach(d=>{
out += "вЂ“ "+d+"\n";
});

}

out += "\n";

});

/* MORNING EXTRA */

if(mode==="morning"){

let notes=document.getElementById("notes").value.trim();

if(!notes){
notes="Rest All Ready For Tomorrow";
}

out+="вЂ” вЂ” вЂ” вЂ” вЂ” вЂ”\n";
out+=formatText(notes)+"\n\n";

/* TRAINING */

const training=document.getElementById("training").value.trim();

if(training){

out+="Route Training Requirements\n";

training.split('\n')
.map(t=>t.trim())
.filter(Boolean)
.forEach(t=>{
out+="вЂ“ "+formatText(t)+"\n";
});

out+="\n";

}

/* BACKUP */

const backupRaw=document.getElementById("backup").value.trim();

if(backupRaw){

const lines=backupRaw.split('\n')
.map(l=>l.trim())
.filter(Boolean);

let available=[];
let issues=[];

lines.forEach(l=>{

l=l.replace(/^[-вЂў]\s*/,'');

const issue=/issue|tyre|driver|mechanical|ac|pending/i.test(l);

if(issue){
issues.push(formatText(l));
}else{
available.push(formatText(l));
}

});

out+="Backup Bus\n";

if(available.length){
out+="Available:\n";
out+="- "+available.join(", ")+"\n\n";
}

if(issues.length){
out+="Issues:\n";
issues.forEach(i=>{
out+="- "+i+"\n";
});
}

}

}

document.getElementById("telegramPreview").innerText=out.trim();

}

/* COPY */

function copyReport(){

const txt=document.getElementById("telegramPreview").innerText;

if(!txt){
alert("Generate report first");
return;
}

navigator.clipboard.writeText(txt);
alert("Report copied");

}

setMode("morning");

</script>

</body>
