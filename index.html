<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Hub Report Builder</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
}

.section{
margin-bottom:10px;
}

textarea{
width:100%;
min-height:60px;
padding:8px;
font-family:Courier New;
}

button{
padding:10px 24px;
background:#4f46e5;
color:#fff;
border:none;
border-radius:20px;
cursor:pointer;
margin:5px;
}

.copy{
background:#16a34a;
}

.mode{
margin-bottom:12px;
}

#previewBox{
margin-top:25px;
display:flex;
justify-content:center;
}

#telegramPreview{
background:#e9f5ff;
border-radius:10px;
padding:15px;
max-width:520px;
white-space:pre-wrap;
font-family:Segoe UI;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container">

<h2>Central Hub Report Builder</h2>

<div class="mode">
Mode:
<button onclick="setMode('morning')">Morning</button>
<button onclick="setMode('evening')">Evening</button>
</div>

<div id="routes"></div>

<div id="morningExtras">

<div class="section">
<h3>Rest / Notes</h3>
<textarea id="notes" placeholder="Rest All Ready For Tomorrow"></textarea>
</div>

<div class="section">
<h3>Route Training Requirements</h3>
<textarea id="training"></textarea>
</div>

<div class="section">
<h3>Backup Buses</h3>
<textarea id="backup"></textarea>
</div>

</div>

<button onclick="generate()">Generate Report</button>
<button class="copy" onclick="copyReport()">Copy</button>

<div id="previewBox">
<div id="telegramPreview"></div>
</div>

</div>

<script>

let mode="morning";

/* TEXT FORMAT */

function formatText(line){

line=line.replace(/\bc(\d+)/gi,'C$1');
line=line.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());

return line.trim();

}

/* ROUTES */

const MORNING_MAIN=[
'T-LP','Chembur-BKC','T-BKC','T-Sobo','Chembur-Worli',
'Mulund-LP','T-NM','MULUND - BKC','T-Santacruze',
'BKC-Metro','Worli Metro-LP','Worli-BKC','Chembur-SOBO'
];

const MORNING_SECONDARY=[
'BKC - Ghatkopar','Mulund-SOBO','MJW-LP','MJW-BKC'
];

const EVENING_MAIN=[
'LP - Thane','Sobo - Thane','BKC - Thane','LP - Mulund',
'Worli - Chembur','Worli-BKC','Santacruz - Thane',
'Worli Metro-LP','BKC-Metro','BKC - Chembur',
'NM - Thane','SOBO - Chembur'
];

const EVENING_SECONDARY=[
'Ghatkopar - BKC','SOBO - Mulund','BKC - Mulund',
'LP - MJW','BKC - MJW','BKC - Mulund'
];

const nums=[
"①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
"⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"
];

/* MODE */

function setMode(m){

mode=m;
renderRoutes();

document.getElementById("morningExtras").style.display=
(mode==="morning")?"block":"none";

}

/* RENDER ROUTES */

function renderRoutes(){

let html="";

let mainRoutes = (mode==="morning") ? MORNING_MAIN : EVENING_MAIN;
let secRoutes = (mode==="morning") ? MORNING_SECONDARY : EVENING_SECONDARY;

mainRoutes.forEach(route=>{

html+=`
<div class="section">
<h3><b>${route}</b></h3>
<textarea id="${route}"></textarea>
</div>
`;

});

secRoutes.forEach(route=>{

html+=`
<div class="section">
<h3><b>▪️ ${route}</b></h3>
<textarea id="${route}"></textarea>
</div>
`;

});

document.getElementById("routes").innerHTML=html;

}

/* GENERATE REPORT */

function generate(){

let mainRoutes = (mode==="morning") ? MORNING_MAIN : EVENING_MAIN;
let secRoutes = (mode==="morning") ? MORNING_SECONDARY : EVENING_SECONDARY;

let filledMain=[];
let filledSec=[];
let emptyMain=[];
let emptySec=[];

/* PROCESS ROUTES */

[...mainRoutes,...secRoutes].forEach(route=>{

const val=document.getElementById(route).value.trim();

let obj={
name:route,
data:[],
secondary:secRoutes.includes(route)
};

if(val){

val.split('\n')
.map(v=>v.trim())
.filter(Boolean)
.forEach(v=>{

let clean=v.replace(/^[-•–]\s*/,'');
clean=formatText(clean);

obj.data.push(clean);

});

if(obj.secondary){
filledSec.push(obj);
}else{
filledMain.push(obj);
}

}else{

if(obj.secondary){
emptySec.push(obj);
}else{
emptyMain.push(obj);
}

}

});

/* ORDER */

let routes=[
...filledMain,
...filledSec,
...emptySec,
...emptyMain
];

let out="✪ Central Hub Update\n\n";

let numIndex=0;

/* PRINT ROUTES */

routes.forEach(r=>{

if(!r.secondary){

let num=nums[numIndex] || (numIndex+1)+".";

out+=num+" **"+r.name+"**\n";

numIndex++;

}else{

out+="▪️ **"+r.name+"**\n";

}

if(r.data.length){

r.data.forEach(d=>{
out+="   – "+d+"\n";
});

}

});

/* MORNING EXTRA */

if(mode==="morning"){

let notes=document.getElementById("notes").value.trim();

if(!notes){
notes="Rest All Ready For Tomorrow";
}

out+="\n**"+formatText(notes)+"**\n\n";

/* TRAINING */

const training=document.getElementById("training").value.trim();

if(training){

out+="**Route Training Requirements**\n";

training.split('\n')
.map(t=>t.trim())
.filter(Boolean)
.forEach(t=>{
out+="   – "+formatText(t)+"\n";
});

out+="\n";

}

/* BACKUP */

const backupRaw=document.getElementById("backup").value.trim();

if(backupRaw){

const lines=backupRaw.split('\n')
.map(l=>l.trim())
.filter(Boolean);

let available=[];
let issues=[];

lines.forEach(l=>{

l=l.replace(/^[-•]\s*/,'');

const issue=/issue|tyre|driver|mechanical|ac|pending|rental|\bna\b|\bn\/a\b/i.test(l);

if(issue){
issues.push(formatText(l));
}else{
available.push(formatText(l));
}

});

out+="**Backup Bus**\n";

if(available.length){
out+="Available: "+available.join(", ")+"\n";
}

if(issues.length){

out+="Issues:\n";

issues.forEach(i=>{
out+="   – "+i+"\n";
});

}

}

}

document.getElementById("telegramPreview").innerText=out.trim();

}

/* COPY */

function copyReport(){

const txt=document.getElementById("telegramPreview").innerText;

if(!txt){
alert("Generate report first");
return;
}

navigator.clipboard.writeText(txt);

alert("Report copied");

}

setMode("morning");

</script>

</body>
</html>
