<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Central Hub Report Builder</title>

<style>

body{
font-family:Segoe UI;
background:#eef2ff;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
}

.section{
margin-bottom:8px;
}

textarea{
width:100%;
min-height:55px;
padding:8px;
font-family:Courier New;
}

button{
padding:10px 22px;
background:#4f46e5;
color:#fff;
border:none;
border-radius:18px;
cursor:pointer;
margin:4px;
}

.copy{background:#16a34a;}
.analyticsBtn{background:#0ea5e9;}

.mode{
margin-bottom:12px;
}

#previewBox{
margin-top:20px;
display:flex;
justify-content:center;
}

#telegramPreview{
background:#e9f5ff;
border-radius:10px;
padding:15px;
max-width:520px;
white-space:pre-wrap;
font-family:Segoe UI;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.exportBox{
margin-top:15px;
padding:12px;
border-radius:10px;
background:#f6f7ff;
}

select,input{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="container">

<h2>Central Hub Report Builder</h2>

<div class="mode">
Mode:
<button onclick="setMode('morning')">Morning</button>
<button onclick="setMode('evening')">Evening</button>
</div>

<div id="routes"></div>

<div id="morningExtras">

<div class="section">
<h3>Rest / Notes</h3>
<textarea id="notes" placeholder="Rest All Ready For Tomorrow"></textarea>
</div>

<div class="section">
<h3>Route Training Requirements</h3>
<textarea id="training"></textarea>
</div>

</div>

<div class="section">
<h3>Backup Buses</h3>
<textarea id="backup"></textarea>
</div>

<button onclick="generate()">Generate Report</button>
<button class="copy" onclick="copyReport()">Copy</button>
<button class="analyticsBtn" onclick="location.href='analytics.html'">📊 Analytics</button>

<div class="exportBox">

<select id="reportType">
<option value="1">Last 1 Day</option>
<option value="3">Last 3 Days</option>
<option value="7">Last 7 Days</option>
<option value="30">Last 30 Days</option>
</select>

<button onclick="exportReport()">Export CSV</button>

</div>

<div id="previewBox">
<div id="telegramPreview"></div>
</div>

</div>

<script>

let mode="morning";

/* JSONBIN API */

const BIN_ID="69b1458ab7ec241ddc5c77b5";
const API_KEY="$2a$10$y93q84bYdEx8IjFFWvI2.ejAYbrdjWjC8Jd76a/02A2KFJ/52dyza";

/* TEXT FORMAT */

function formatText(line){

line=line.replace(/\bc(\d+)/gi,'C$1');
line=line.toLowerCase().replace(/\b\w/g,l=>l.toUpperCase());

return line.trim();

}

/* ROUTES */

const MAIN_ROUTES=[
'T-LP','Chembur-BKC','T-BKC','T-Sobo','Chembur-Worli',
'Mulund-LP','T-NM','MULUND - BKC','T-Santacruze',
'BKC-Metro','Worli Metro-LP','Worli-BKC','Chembur-SOBO'
];

const SECONDARY_ROUTES=[
'BKC - Ghatkopar','Mulund-SOBO','MJW-LP','MJW-BKC'
];

const nums=[
"①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩",
"⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"
];

/* MODE */

function setMode(m){

mode=m;

renderRoutes();

document.getElementById("morningExtras").style.display=
(mode==="morning")?"block":"none";

}

/* RENDER ROUTES */

function renderRoutes(){

let html="";

[...MAIN_ROUTES,...SECONDARY_ROUTES].forEach(route=>{

let symbol=SECONDARY_ROUTES.includes(route)?"▪️ ":"";

html+=`
<div class="section">
<h3><b>${symbol}${route}</b></h3>
<textarea id="${route}"></textarea>
</div>
`;

});

document.getElementById("routes").innerHTML=html;

}

/* GENERATE REPORT */

function generate(){

let filledMain=[];
let filledSec=[];
let emptyMain=[];
let emptySec=[];

let records=[];

const date=new Date().toISOString().slice(0,10);

[...MAIN_ROUTES,...SECONDARY_ROUTES].forEach(route=>{

const val=document.getElementById(route).value.trim();

let obj={name:route,data:[]};

if(val){

val.split('\n')
.map(v=>v.trim())
.filter(Boolean)
.forEach(v=>{

let clean=v.replace(/^[-•–]\s*/,'');
clean=formatText(clean);

obj.data.push(clean);

records.push({
date:date,
mode:mode,
route:route,
bus:clean.split(" ")[0],
issue:clean.replace(clean.split(" ")[0],"").trim()
});

});

if(SECONDARY_ROUTES.includes(route)){
filledSec.push(obj);
}else{
filledMain.push(obj);
}

}else{

if(SECONDARY_ROUTES.includes(route)){
emptySec.push(obj);
}else{
emptyMain.push(obj);
}

}

});

/* ROUTE SORT */

let routes=[
...filledMain,
...filledSec,
...emptySec,
...emptyMain
];

let out="✪ Central Hub Update\n\n";

let numIndex=0;

routes.forEach(r=>{

if(!SECONDARY_ROUTES.includes(r.name)){

let num=nums[numIndex] || (numIndex+1);

out+=num+" **"+r.name+"**\n";

numIndex++;

}else{

out+="▪️ **"+r.name+"**\n";

}

r.data.forEach(d=>{
out+="– "+d+"\n";
});

});

/* MORNING EXTRA */

if(mode==="morning"){

let notes=document.getElementById("notes").value.trim();

if(!notes){
notes="Rest All Ready For Tomorrow";
}

out+="\n**"+formatText(notes)+"**\n\n";

const training=document.getElementById("training").value.trim();

if(training){

out+="**Route Training Requirements**\n";

training.split('\n')
.map(t=>t.trim())
.filter(Boolean)
.forEach(t=>{
out+="– "+formatText(t)+"\n";
});

}

/* BACKUP BUS */

const backupRaw=document.getElementById("backup").value.trim();

if(backupRaw){

const lines=backupRaw.split('\n')
.map(l=>l.trim())
.filter(Boolean);

let available=[];
let issues=[];

lines.forEach(l=>{

l=l.replace(/^[-•]\s*/,'');

const issue=/issue|tyre|driver|mechanical|ac|pending|rental|\bna\b|\bn\/a\b/i.test(l);

if(issue){
issues.push(formatText(l));
}else{
available.push(formatText(l));
}

});

out+="\n**Backup Bus**\n";

if(available.length){
out+="Available: "+available.join(", ")+"\n";
}

if(issues.length){

out+="Issues:\n";

issues.forEach(i=>{
out+="– "+i+"\n";
});

}

}

}

document.getElementById("telegramPreview").innerText=out.trim();

/* SAVE TO API */

saveToDatabase(records);

}

/* JSONBIN SAVE */

async function saveToDatabase(records){

if(!records.length) return;

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
headers:{ "X-Master-Key":API_KEY }
});

const data=await res.json();

let db=data.record.reports || [];

db=db.concat(records);

await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body:JSON.stringify({reports:db})
});

}

/* FETCH DATA */

async function fetchDatabase(){

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
headers:{ "X-Master-Key":API_KEY }
});

const data=await res.json();

return data.record.reports || [];

}

/* CSV EXPORT */

function downloadCSV(records,name){

let csv="date,mode,route,bus,issue\n";

records.forEach(r=>{
csv+=`${r.date},${r.mode},${r.route},${r.bus},${r.issue}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;
a.download=name;
a.click();

}

/* EXPORT */

async function exportReport(){

const days=parseInt(document.getElementById("reportType").value);

const data=await fetchDatabase();

const now=new Date();
const start=new Date();

start.setDate(now.getDate()-days);

const filtered=data.filter(r=>new Date(r.date)>=start);

downloadCSV(filtered,"hub_report.csv");

}

/* COPY */

function copyReport(){

const txt=document.getElementById("telegramPreview").innerText;

if(!txt){
alert("Generate report first");
return;
}

navigator.clipboard.writeText(txt);

alert("Report copied");

}

setMode("morning");

</script>

</body>
</html>
