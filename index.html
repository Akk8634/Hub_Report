<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Hub Report Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

:root {
  --morning: #f59e0b;
  --evening: #6366f1;
  --active: #f59e0b;
  --bg: #0f1117;
  --card: #1a1d27;
  --card2: #20243a;
  --border: #2e3250;
  --text: #e8eaf6;
  --muted: #7c82a8;
  --green: #10b981;
  --red: #ef4444;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px;
}

.app {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 20px;
  align-items: start;
}

/* HEADER */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.header h1 {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--active);
}

.header h1 span { color: var(--text); }

/* MODE TOGGLE */
.mode-toggle {
  display: flex;
  background: var(--bg);
  border-radius: 50px;
  padding: 4px;
  gap: 4px;
  border: 1px solid var(--border);
}

.mode-btn {
  padding: 8px 20px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  background: transparent;
  color: var(--muted);
  transition: all 0.25s;
}

.mode-btn.active-morning {
  background: var(--morning);
  color: #000;
}

.mode-btn.active-evening {
  background: var(--evening);
  color: #fff;
}

/* LEFT PANEL */
.left-panel { display: flex; flex-direction: column; gap: 14px; }

/* SECTION CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}

.card-header .route-label {
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--active);
  text-transform: uppercase;
}

.card-header .secondary-tag {
  font-size: 0.68rem;
  background: #2e3250;
  color: var(--muted);
  padding: 2px 8px;
  border-radius: 20px;
}

.card textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  padding: 10px 14px;
  resize: vertical;
  min-height: 52px;
  outline: none;
}

.card textarea::placeholder { color: #3d4270; }
.card textarea:focus { background: rgba(255,255,255,0.02); }

/* SECTION DIVIDER */
.section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 6px 0 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* EXTRAS SECTION */
.extras-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.field-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.extras-card textarea {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  padding: 10px 12px;
  resize: vertical;
  min-height: 50px;
  outline: none;
}

.extras-card textarea:focus {
  border-color: var(--active);
}

.extras-card textarea::placeholder { color: #3d4270; }

/* ACTION BUTTONS */
.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn {
  padding: 11px 22px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  transition: all 0.2s;
}

.btn-generate {
  background: var(--active);
  color: #000;
  flex: 1;
}

.btn-generate:hover { opacity: 0.85; transform: translateY(-1px); }

.btn-copy {
  background: var(--green);
  color: #fff;
}

.btn-copy:hover { opacity: 0.85; }

.btn-clear {
  background: #2e3250;
  color: var(--muted);
}

.btn-clear:hover { background: var(--border); }

/* RIGHT PANEL */
.right-panel {
  position: sticky;
  top: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* PREVIEW BOX */
.preview-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--card2);
  border-bottom: 1px solid var(--border);
}

.preview-header span {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.preview-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
}

.preview-dot.live { background: var(--green); animation: pulse 1.5s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

#telegramPreview {
  padding: 16px;
  white-space: pre-wrap;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.7;
  color: #c5cae9;
  min-height: 120px;
  max-height: 500px;
  overflow-y: auto;
}

#telegramPreview::-webkit-scrollbar { width: 4px; }
#telegramPreview::-webkit-scrollbar-track { background: transparent; }
#telegramPreview::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-preview {
  color: #3d4270;
  font-style: italic;
  text-align: center;
  padding: 40px 20px;
}

/* EXPORT CARD */
.export-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.export-card h3 {
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.export-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.export-card select,
.export-card input {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  padding: 8px 12px;
  outline: none;
  flex: 1;
}

.export-card select:focus,
.export-card input:focus { border-color: var(--active); }

#customDays { display: none; max-width: 100px; }

.btn-export {
  background: #6366f1;
  color: #fff;
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.btn-export:hover { opacity: 0.85; }

/* STATUS TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #fff;
  padding: 12px 20px;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 999;
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { background: var(--red); }

/* ROUTE GROUPS */
.group-divider {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #3d4270;
  padding: 8px 0 2px;
  grid-column: 1 / -1;
}

.routes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .right-panel { position: static; }
  .routes-grid { grid-template-columns: 1fr; }
}

@media (max-width: 600px) {
  .header { flex-direction: column; gap: 12px; }
  .routes-grid { grid-template-columns: 1fr; }
}

/* Evening mode accent */
body.evening-mode {
  --active: #818cf8;
  --morning: #818cf8;
}

body.evening-mode .mode-btn.active-evening {
  background: var(--evening);
}

.char-count {
  font-size: 0.65rem;
  color: #3d4270;
  text-align: right;
  padding: 2px 14px 6px;
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Central Hub <span>Report Builder</span></h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="currentDate" style="font-size:0.8rem; color:var(--muted);"></span>
      <div class="mode-toggle">
        <button class="mode-btn active-morning" id="btnMorning" onclick="setMode('morning')">☀️ Morning</button>
        <button class="mode-btn" id="btnEvening" onclick="setMode('evening')">🌙 Evening</button>
      </div>
    </div>
  </div>

  <!-- LEFT PANEL -->
  <div class="left-panel">

    <!-- MAIN ROUTES -->
    <div class="section-title">Main Routes</div>
    <div class="routes-grid" id="mainRoutes"></div>

    <!-- SECONDARY ROUTES -->
    <div class="section-title">Secondary Routes ▪️</div>
    <div class="routes-grid" id="secondaryRoutes"></div>

    <!-- MORNING EXTRAS -->
    <div id="morningExtras">
      <div class="section-title">Morning Sections</div>
      <div class="extras-card">
        <div>
          <div class="field-label">Rest / Notes</div>
          <textarea id="notes" placeholder="Rest All Ready For Tomorrow" rows="2"></textarea>
        </div>
        <div>
          <div class="field-label">Route Training Requirements</div>
          <textarea id="training" placeholder="Enter training requirements..." rows="2"></textarea>
        </div>
        <div>
          <div class="field-label">Backup Buses</div>
          <textarea id="backup" placeholder="Enter Backup Buses Here..." rows="3"></textarea>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn btn-generate" onclick="generate()">⚡ Generate Report</button>
      <button class="btn btn-copy" onclick="copyReport()">📋 Copy</button>
      <button class="btn btn-clear" onclick="clearAll()">🗑 Clear</button>
      <a href="analytics.html" style="padding:11px 22px; background:#38bdf8; color:#000; border-radius:50px; font-family:Outfit,sans-serif; font-size:0.88rem; font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:6px; transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">📊 Analytics</a>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">

    <!-- PREVIEW -->
    <div class="preview-card">
      <div class="preview-header">
        <span>Telegram Preview</span>
        <div class="preview-dot" id="previewDot"></div>
      </div>
      <div id="telegramPreview">
        <div class="empty-preview">Generate a report to see preview</div>
      </div>
    </div>

    <!-- EXPORT -->
    <div class="export-card">
      <h3>📊 Export Report</h3>
      <div class="export-row">
        <select id="reportType" onchange="toggleCustomDays()">
          <option value="1">Last 1 Day</option>
          <option value="3">Last 3 Days</option>
          <option value="7">Last 7 Days</option>
          <option value="30">Last 30 Days</option>
          <option value="month">This Month</option>
          <option value="year">This Year</option>
          <option value="custom">Custom Days</option>
        </select>
        <input id="customDays" placeholder="Days" type="number" min="1">
        <button class="btn-export" onclick="exportReport()">Export CSV</button>
      </div>
    </div>

  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

const BIN_ID  = "69b1b250c3097a1dd518d2c5";
const API_KEY = "$2a$10$tTO9TaKMwAvb/32qO/lWVepk4vpPKCpFKuQj02fPoyj1hjBUBB7uq";

const ISSUE_KEYWORDS = ['issue','tyre','driver','mechanical','ac','pending','rental','na','n/a','breakdown','flat'];

// Circled numbers for main routes
const NUMS = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];

/* ── MORNING ROUTES (display name : id key) ── */
const MAIN_ROUTES = [
  { id: 'T-LP',          morning: 'T-LP',          evening: 'LP - Thane' },
  { id: 'Chembur-BKC',   morning: 'Chembur-BKC',   evening: 'BKC - Chembur' },
  { id: 'T-BKC',         morning: 'T-BKC',          evening: 'BKC - Thane' },
  { id: 'T-Sobo',        morning: 'T-Sobo',         evening: 'Sobo - Thane' },
  { id: 'Chembur-Worli', morning: 'Chembur-Worli',  evening: 'Worli - Chembur' },
  { id: 'Mulund-LP',     morning: 'Mulund-LP',      evening: 'LP - Mulund' },
  { id: 'T-NM',          morning: 'T-NM',           evening: 'NM - Thane' },
  { id: 'MULUND-BKC',    morning: 'MULUND - BKC',   evening: 'BKC - MULUND' },
  { id: 'T-Santacruze',  morning: 'T-Santacruze',   evening: 'Santacruz - Thane' },
  { id: 'BKC-Metro',     morning: 'BKC-Metro',      evening: 'Metro - BKC' },
  { id: 'Worli-Metro-LP',morning: 'Worli Metro-LP', evening: 'LP - Worli Metro' },
  { id: 'Worli-BKC',     morning: 'Worli-BKC',      evening: 'BKC - Worli' },
  { id: 'Chembur-SOBO',  morning: 'Chembur-SOBO',   evening: 'SOBO - Chembur' },
];

const SECONDARY_ROUTES = [
  { id: 'BKC-Ghatkopar', morning: 'BKC - Ghatkopar', evening: 'BKC - Ghatkopar' },
  { id: 'Mulund-SOBO',   morning: 'Mulund-SOBO',     evening: 'SOBO - Mulund' },
  { id: 'MJW-LP',        morning: 'MJW-LP',           evening: 'LP - MJW' },
  { id: 'MJW-BKC',       morning: 'MJW-BKC',          evening: 'BKC - MJW' },
];

let mode = 'morning';

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('currentDate').textContent =
    new Date().toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  setMode('morning');
});

/* ── ROUTE ID ── */
function rid(r) {
  return 'r_' + r.id.replace(/[^a-zA-Z0-9]/g, '_');
}

/* ── SET MODE ── */
function setMode(m) {
  mode = m;
  document.body.className = m === 'evening' ? 'evening-mode' : '';
  document.getElementById('btnMorning').className = 'mode-btn' + (m === 'morning' ? ' active-morning' : '');
  document.getElementById('btnEvening').className = 'mode-btn' + (m === 'evening' ? ' active-evening' : '');
  document.getElementById('morningExtras').style.display = m === 'morning' ? 'block' : 'none';
  renderRoutes();
}

/* ── RENDER ROUTES ── */
function renderRoutes() {
  // Save textarea values before re-render
  const saved = {};
  [...MAIN_ROUTES, ...SECONDARY_ROUTES].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el) saved[r.id] = el.value;
  });

  function makeCard(r, isSecondary) {
    const id = rid(r);
    const label = mode === 'evening' ? r.evening : r.morning;
    return `
      <div class="card">
        <div class="card-header">
          <span class="route-label">${isSecondary ? '▪️ ' : ''}<b>${label}</b></span>
          ${isSecondary ? '<span class="secondary-tag">secondary</span>' : ''}
        </div>
        <textarea id="${id}" placeholder="Enter bus issues..."></textarea>
      </div>`;
  }

  document.getElementById('mainRoutes').innerHTML =
    MAIN_ROUTES.map(r => makeCard(r, false)).join('');
  document.getElementById('secondaryRoutes').innerHTML =
    SECONDARY_ROUTES.map(r => makeCard(r, true)).join('');

  // Restore values
  [...MAIN_ROUTES, ...SECONDARY_ROUTES].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el && saved[r.id]) el.value = saved[r.id];
  });
}

/* ── FORMAT TEXT ── */
function formatText(line) {
  line = line.replace(/\bc(\d+)/gi, 'C$1');
  line = line.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
  return line.trim();
}

/* ── SORT ROUTES ── */
// Order: Filled main → Filled secondary → Empty secondary → Empty main
function getSorted() {
  const filledMain = [], filledSec = [], emptySec = [], emptyMain = [];

  MAIN_ROUTES.forEach(r => {
    const val = (document.getElementById(rid(r)) || {}).value || '';
    (val.trim() ? filledMain : emptyMain).push({ r, secondary: false });
  });

  SECONDARY_ROUTES.forEach(r => {
    const val = (document.getElementById(rid(r)) || {}).value || '';
    (val.trim() ? filledSec : emptySec).push({ r, secondary: true });
  });

  return [...filledMain, ...filledSec, ...emptySec, ...emptyMain];
}

/* ── PARSE BACKUP ── */
function parseBackup(raw) {
  const available = [], issues = [];
  raw.split('\n').forEach(line => {
    line = formatText(line.trim());
    if (!line) return;
    const low = line.toLowerCase();
    ISSUE_KEYWORDS.some(k => low.includes(k)) ? issues.push(line) : available.push(line);
  });
  return { available, issues };
}

/* ── GENERATE ── */
function generate() {
  const sorted  = getSorted();
  const date    = new Date().toISOString().slice(0, 10);
  const records = [];
  const emoji   = mode === 'morning' ? '🌅' : '🌙';
  const label   = mode === 'morning' ? 'Morning' : 'Evening';

  let out = `✪ Central Hub Update\n\n`;

  let hasContent = false;

  // First pass: assign numbers to ALL main routes in sorted order
  // (filled first, then empty — numbering follows position)
  let numIdx = 0;
  const routeNums = {};
  sorted.forEach(({ r, secondary }) => {
    if (!secondary) routeNums[r.id] = NUMS[numIdx++];
  });

  sorted.forEach(({ r, secondary }) => {
    const el  = document.getElementById(rid(r));
    if (!el) return;
    const val = el.value.trim();

    const displayName = mode === 'evening' ? r.evening : r.morning;
    const prefix      = secondary ? '▪️' : routeNums[r.id];

    if (val) {
      hasContent = true;
      out += `${prefix} **${displayName}**\n`;
      val.split('\n').forEach(v => {
        v = formatText(v);
        if (!v) return;
        out += `– ${v}\n`;
        const parts = v.split(' ');
        records.push({ date, mode, route: displayName, bus: parts[0], issue: parts.slice(1).join(' ').trim() });
      });
      out += '\n';
    } else {
      // Empty route — show name only, no issues
      out += `${prefix} **${displayName}**\n\n`;
    }
  });

  if (!hasContent) { showToast('No route data entered', true); return; }

  /* MORNING EXTRAS */
  if (mode === 'morning') {
    const backup = document.getElementById('backup').value.trim();
    if (backup) {
      const { available, issues } = parseBackup(backup);
      out += `**🚌 Backup Buses**\n`;
      if (available.length) { out += `✅ Available:\n`; available.forEach(b => { out += `– ${b}\n`; }); }
      if (issues.length)    { out += `⚠️ Issues:\n`;   issues.forEach(b => { out += `– ${b}\n`; }); }
      out += '\n';
    }

    const training = document.getElementById('training').value.trim();
    if (training) {
      out += `**📋 Training Requirements**\n`;
      training.split('\n').forEach(t => { t = formatText(t); if (t) out += `– ${t}\n`; });
      out += '\n';
    }

    const notes = document.getElementById('notes').value.trim() || 'Rest All Ready For Tomorrow';
    out += `— — — — — —\n• **${notes}**\n`;
  }

  document.getElementById('telegramPreview').innerText = out;
  document.getElementById('previewDot').className = 'preview-dot live';

  if (records.length) autoSave(records);
  showToast('Report generated ✓');
}

/* ── COPY ── */
function copyReport() {
  const txt = document.getElementById('telegramPreview').innerText;
  if (!txt || txt.includes('Generate a report')) { showToast('Generate report first', true); return; }
  navigator.clipboard.writeText(txt).then(() => showToast('Copied to clipboard ✓'));
}

/* ── CLEAR ── */
function clearAll() {
  [...MAIN_ROUTES, ...SECONDARY_ROUTES].forEach(r => {
    const el = document.getElementById(rid(r));
    if (el) el.value = '';
  });
  ['notes','training','backup'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('telegramPreview').innerHTML = '<div class="empty-preview">Generate a report to see preview</div>';
  document.getElementById('previewDot').className = 'preview-dot';
  showToast('Cleared');
}

/* ── TOAST ── */
function showToast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast show' + (error ? ' error' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 2500);
}

/* ── CUSTOM DAYS ── */
function toggleCustomDays() {
  document.getElementById('customDays').style.display =
    document.getElementById('reportType').value === 'custom' ? 'block' : 'none';
}

/* ── JSONBIN SAVE ── */
async function autoSave(records) {
  await saveToDatabase(records);
}

async function saveToDatabase(records) {
  if (!records.length) return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();
    let db = (data && data.record && Array.isArray(data.record.reports)) ? data.record.reports : [];
    db = db.concat(records);
    const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY,
        'X-Bin-Versioning': 'false'
      },
      body: JSON.stringify({ reports: db })
    });
    if (!putRes.ok) throw new Error('Save failed: ' + putRes.status);
    console.log('Saved ' + records.length + ' record(s) to JSONBin');
    showToast('Saved ' + records.length + ' record(s) to DB');
  } catch(e) {
    console.error('JSONBin save error:', e);
    showToast('Save failed: ' + e.message, true);
  }
}

/* ── FETCH DATA ── */
async function fetchData() {
  const res  = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
  const data = await res.json();
  return (data.record && data.record.reports) ? data.record.reports : [];
}

/* ── CSV ── */
function downloadCSV(records, name) {
  let csv = 'date,mode,route,bus,issue\n';
  records.forEach(r => { csv += `${r.date},${r.mode},"${r.route}","${r.bus}","${r.issue}"\n`; });
  const a  = document.createElement('a');
  a.href   = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = name;
  a.click();
  showToast('CSV downloaded ✓');
}

/* ── EXPORT ── */
async function exportReport() {
  const type = document.getElementById('reportType').value;
  let data;
  try { data = await fetchData(); } catch(e) { showToast('Failed to fetch data', true); return; }

  const now = new Date();
  let filtered, filename;

  if (type === 'month') {
    filtered = data.filter(r => { const d = new Date(r.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
    filename = `monthly_${now.toISOString().slice(0,7)}.csv`;
  } else if (type === 'year') {
    filtered = data.filter(r => new Date(r.date).getFullYear() === now.getFullYear());
    filename = `yearly_${now.getFullYear()}.csv`;
  } else {
    const days  = type === 'custom' ? parseInt(document.getElementById('customDays').value) || 1 : parseInt(type);
    const start = new Date(); start.setDate(now.getDate() - days);
    filtered = data.filter(r => new Date(r.date) >= start);
    filename = `report_${days}days.csv`;
  }

  if (!filtered.length) { showToast('No data for selected range', true); return; }
  downloadCSV(filtered, filename);
}
