function renderRoutes(){

const list = mode==="morning" ? MORNING : EVENING;

let html="";

list.forEach(([sym,id])=>{

html += `<div class="section">
<h3>${sym} ${id}</h3>

</div>`;

});

document.getElementById("routes").innerHTML = html;

/* GENERATE REPORT */

function generate(){

const list = mode==="morning" ? MORNING : EVENING;

let filledRoutes=[];
let emptyRoutes=[];

list.forEach(([sym,id])=>{

const val = document.getElementById(id).value.trim();

let block = `${sym} ${id}\n`;

if(val){

val.split('\n')
.map(v=>v.trim())
.filter(Boolean)
.forEach(v=>{

let clean = v.replace(/^[-•–]\s*/,'');
clean = formatText(clean);

block += '– ' + clean + '\n';

});

filledRoutes.push(block);

}else{

emptyRoutes.push(block);

}

});

/* HEADER */

let out = '✪ Central Hub Update\n\n';

/* ROUTES */

out += filledRoutes.join('\n');
out += '\n';
out += emptyRoutes.join('\n');

/* MORNING EXTRA */

if(mode==="morning"){

let notes = document.getElementById('notes').value.trim();

if(!notes){
notes = "Rest All Ready For Tomorrow";
}

out += '\n— — — — — —\n';
out += formatText(notes) + '\n\n';

const training = document.getElementById('training').value.trim();

if(training){

out += 'Route Training Requirements\n';

training.split('\n')
.map(t=>t.trim())
.filter(Boolean)
.forEach(t=>{

});

out += '\n';

}

/* BACKUP */

const backupRaw = document.getElementById('backup').value.trim();

if(backupRaw){

const lines = backupRaw.split('\n')
.map(l=>l.trim())
.filter(Boolean);

const available=[];
const issues=[];

lines.forEach(l=>{

l=l.replace(/^[-•]\s*/,'');

const issue=/issue|tyre|driver|mechanical|ac|pending/i.test(l);

if(issue){
issues.push(formatText(l));
}else{
available.push(formatText(l));
}

});

out += 'Backup Bus\n';

if(available.length){
out += 'Available:\n';
out += '- ' + available.join(', ') + '\n\n';
}

if(issues.length){
out += 'Issues:\n';
issues.forEach(i=>{
out += '- ' + i + '\n';
});
}

}

}

/* PREVIEW */

document.getElementById("telegramPreview").innerText = out.trim();

}

/* COPY */

function copyReport(){

const txt = document.getElementById("telegramPreview").innerText;

if(!txt){
alert("Generate report first");
return;
}

navigator.clipboard.writeText(txt);

alert("Report copied. Paste in Telegram.");

}

setMode("morning");
